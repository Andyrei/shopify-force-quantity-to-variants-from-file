# Docker Compose for Shopify Quantity Manager
services:
  app:
    build: .
    ports:
      - "127.0.0.1:9999:9999"
    volumes:
      # Mount resources directory for file uploads/processing
      - ./resources:/app/resources
      # Optional: mount logs directory
      - ./logs:/app/logs
      # Mount store config (auto-generated by generate_config.py)
      - ./config_stores.toml:/app/config_stores.toml:ro
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=production
      - ROOT_PATH=/inventory-force
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s