{% extends "base.html" %}

{% block title %}Store Logs{% endblock %}

{% block header_store_select %}
<div class="header-store-select">
    <select id="store-select" onchange="handleStoreChange(this)">
        <option value="">-- Select Store --</option>
        {% for store_id, store_config in stores.items() %}
        <option value="{{ store_id }}" data-store-name="{% if store_config.title %}{{ store_config.title }}{% else %}{{ store_config.store_name }}{% endif %}">{% if store_config.title %}{{ store_config.title }}{% else %}{{ store_config.store_name }}{% endif %}</option>
        {% endfor %}
    </select>
</div>
<script>
function handleStoreChange(select) {
    const storeId = select.value;
    if (!storeId) {
        localStorage.removeItem('selectedStore');
        localStorage.removeItem('selectedStoreName');
        window.location.href = window.location.pathname;
        return;
    }
    const storeName = select.options[select.selectedIndex].textContent.trim();
    localStorage.setItem('selectedStore', storeId);
    localStorage.setItem('selectedStoreName', storeName);
    window.location.href = window.location.pathname + '?store=' + storeId;
}
(function() {
    const storeSelect = document.getElementById('store-select');
    if (!storeSelect) return;
    const urlParams = new URLSearchParams(window.location.search);
    const storeFromUrl = urlParams.get('store');
    const storedStore = localStorage.getItem('selectedStore');
    if (storeFromUrl) {
        storeSelect.value = storeFromUrl;
        localStorage.setItem('selectedStore', storeFromUrl);
        const option = storeSelect.options[storeSelect.selectedIndex];
        if (option) localStorage.setItem('selectedStoreName', option.textContent.trim());
        history.replaceState({}, '', window.location.pathname);
    } else if (storedStore) {
        window.location.href = window.location.pathname + '?store=' + storedStore;
    }
})();
</script>
{% endblock %}

{% block content %}
<div id="logs-page" data-has-store="{{ '1' if current_store else '0' }}">

<div class="card{% if not current_store %} is-hidden{% endif %}" id="logs-section">
    <div class="logs-toolbar">
        <h2>Store Logs</h2>
        <button id="refresh-logs">Refresh</button>
    </div>
    <ul id="logs-list">
        <li>Loading logs...</li>
    </ul>
</div>

<div class="card" id="log-preview-section" style="display: none;">
    <div class="logs-toolbar">
        <h2 id="log-preview-title">Log Preview</h2>
        <button id="download-log-btn" style="display: none;">Download</button>
    </div>
    <pre class="box" id="log-preview-content" style="max-height: 50dvh; overflow: auto; padding: 1.2rem;">
Select a log file from the list to preview its content.
    </pre>
</div>
</div>

<script>
    const logsPageRoot = document.getElementById("logs-page");
    window.storeSelected = logsPageRoot && logsPageRoot.dataset.hasStore === "1";
</script>
{% endblock %}

{% block page_scripts %}
<script src="{{ request.scope.root_path }}/static/logs.js"></script>
{% endblock %}
